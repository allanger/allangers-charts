---
shortcuts:
  hostname: stalwart.company

base:
  workload:
    kind: Deployment
    strategy:
      type: RollingUpdate
    containers:
      stalwart:
        image:
          registry: registry.hub.docker.com
          repository: stalwartlabs/stalwart
          tag:
          pullPolicy: Always
        ports:
          web:
            - https
            - http
          mail:
            - smtp
            - smtps
            - smtp-startls
            - imap
            - imaptls
            - pop3
            - pop3s
            - sieve
        args:
          - --config
          - /app/config.json
        volumeMounts:
          files:
            config:
              path: /app/config.json
              subPath: config.json
        livenessProbe:
          tcpSocket:
            port: 25
          initialDelaySeconds: 3
          periodSeconds: 3
        readinessProbe:
          tcpSocket:
            port: 25
          initialDelaySeconds: 3
          periodSeconds: 3

ingress:
  main:
    enabled: true
    annotations: {}
    class: traefik
    rules:
      - host: "{{ .Values.shortcuts.hostname }}"
        http:
          paths:
            - backend:
                service:
                  name: '{{ include "chart.fullname" $ }}-web'
                  port:
                    number: 8080
              path: /
              pathType: Prefix
    tls:
      - hosts:
          - "{{ .Values.shortcuts.hostname }}"
        secretName: "{{ .Values.shortcuts.hostname }}"

services:
  web:
    enabled: true
    type: ClusterIP
    ports:
      https:
        port: 443
        targetPort: 443
        protocol: TCP
      http:
        port: 8080
        targetPort: 8080
        protocol: TCP
  mail:
    enabled: true
    type: ClusterIP
    ports:
      smtp:
        port: 25
        targetPort: 25
        protocol: TCP
      smtps:
        port: 465
        targetPort: 465
        protocol: TCP
      smtp-startls:
        port: 587
        targetPort: 587
        protocol: TCP
      imap:
        port: 143
        targetPort: 143
        protocol: TCP
      imaptls:
        port: 993
        targetPort: 993
        protocol: TCP
      pop3:
        port: 110
        targetPort: 110
        protocol: TCP
      pop3s:
        port: 995
        targetPort: 995
        protocol: TCP
      sieve:
        port: 4190
        targetPort: 4190
        protocol: TCP

config:
  files:
    config:
      enabled: false
      sensitive: false
      remove: []
      entries:
        config.json:
          convertTo: json
          data: {}
